<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Generador de temas Shopify</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 16px; padding: 10px 16px; cursor: pointer; }
    #status { margin-top: 20px; white-space: pre-line; }
  </style>
</head>
<body>

  <h1>Generador de temas Shopify (basado en Dawn)</h1>

  <label>Industria</label>
  <select id="industry">
    <option value="comida">Comida</option>
    <option value="zapatos">Zapatos</option>
    <option value="joyeria">Joyería</option>
    <option value="ropa">Ropa</option>
    <option value="tecnologia">Tecnología</option>
  </select>

  <label>Estilo visual</label>
  <select id="style">
    <option value="minimalista">Minimalista</option>
    <option value="elegante">Elegante</option>
    <option value="moderno">Moderno</option>
    <option value="colorido">Colorido</option>
    <option value="oscuro">Oscuro</option>
  </select>

  <label>Colores principales</label>
  <input id="colors" type="text" placeholder="#ff0000, blanco, dorado" />

  <label>Características deseadas</label>
  <input id="features" type="text" placeholder="menú, reseñas, galería" />

  <button onclick="generateTheme()">Generar tema</button>
  <button id="downloadBtn" onclick="downloadZip()" disabled>Descargar ZIP</button>

  <div id="status"></div>

  <script>
    async function generateTheme() {
      document.getElementById('status').innerText = "⏳ Generando tema...";
      document.getElementById('downloadBtn').disabled = true;

      const payload = {
        industry: document.getElementById('industry').value,
        style: document.getElementById('style').value,
        colors: document.getElementById('colors').value,
        features: document.getElementById('features').value
      };

      const res = await fetch('/api/generar-tema', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        let msg = "❌ Error generando el tema.";
        try {
          const data = await res.json();
          if (data?.error) msg += "\n\n" + data.error;
          if (data?.rawSnippet) msg += "\n\nSnippet IA:\n" + data.rawSnippet;
        } catch (e) {
          msg += "\n\n(No se pudo leer el detalle del error)";
        }
        document.getElementById('status').innerText = msg;
        document.getElementById('downloadBtn').disabled = true;
        return;
      }

      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      window.lastZipUrl = url;

      document.getElementById('status').innerText = "✔ Tema generado correctamente.";
      document.getElementById('downloadBtn').disabled = false;
    }

    function downloadZip() {
      const a = document.createElement('a');
      a.href = window.lastZipUrl;
      a.download = "shopify-theme.zip";
      a.click();
    }
  </script>

</body>
</html>
